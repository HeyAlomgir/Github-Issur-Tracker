<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB-ISSU-TRACKER</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- daisiui and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

<section class="w-[400px] mx-auto  flex items-center justify-center ">

  <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 w-[700px] h-[700px]">
    <div class="mt-25  text-center space-y-2">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="font-bold text-[#64748B]">Sign in to manage your issues</p>
    </div>

  <label class="label font-bold text-[14px] text-[#7A00FF]">Username</label>
  <input id="username" type="text"   class="input w-full font-bold " placeholder="Enter Username" />
   <h4 class="font-bold">Default : admin</h4><br> 

  <label class="label font-bold text-[14px] text-[#7A00FF]">Password</label>
  <input id="password" type="password" class="input w-full font-bold " autocomplete="new-password" placeholder="Password" />
  <h4 class="font-bold">Default : admin123</h4>

  <button id="sign-btn" class="btn btn-neutral mt-4 w-full">Sign In</button>

  <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 mt-2 text-center">
     <legend class="font-bold">OR</legend>

     <p class="text-[14px] text-[#7A00FF]">Demo Credentials:</p>
     <div class="w-full bg-red-200 py-1 rounded">
      <h3 class="font-bold">Username :<span class="text-[#7A00FF]">admin</span></h3>
      <h3 class="font-bold">Password :<span class="text-[#7A00FF]">admin123</span></h3>
     </div>
</fieldset>
</fieldset>




</section>
 

<script src="./script/login.js"></script>
</body>
</html>
